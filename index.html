<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You Are An Idiot!</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
  </style>
</head>

<body>
  <img src="YouAreAnIdiot.gif" alt="gif" />

  <audio id="bg" loop>
    <source src="YouAreAnIdiot_audio.wav" type="audio/wav">
  </audio>

  <script>
    // Audio trigger on first click
    document.addEventListener("click", () => {
      const audio = document.getElementById("bg");
      audio.play();
    }, { once: true });

    // Tab duplication loop logic
    const numberOfDuplicates = 1; 
    const delayInMilliseconds = 1000; 

    let count = 0;
    const duplicateLoop = setInterval(() => {
        if (count < numberOfDuplicates) {
            window.open(window.location.href, '_blank');
            count++;
        } else {
            clearInterval(duplicateLoop);
            console.log("Finished duplicating tabs.");
        }
    }, delayInMilliseconds);
  </script>
</body>
</html>
