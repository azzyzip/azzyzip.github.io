<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>azzy.zip</title>

<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32">
<link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">

<meta name="theme-color" content="#0568D3">

<style>
:root {
    --bg: #0C0C0E;
    --accent: #0568D3;
    --text: #FFFFFF;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
}

/* Header */
.header {
    height: 60px;
    display: flex;
    align-items: center;
    padding: 0 20px;
    border-bottom: 2px solid var(--accent);
}

.menu-btn {
    background: none;
    border: none;
    color: var(--text);
    font-size: 28px;
    cursor: pointer;
}

/* Sidebar */
.sidebar {
    position: fixed;
    top: 0;
    left: -250px;
    width: 250px;
    height: 100%;
    background: #111114;
    border-right: 2px solid var(--accent);
    transition: left 0.3s ease;
    padding-top: 70px;
    z-index: 1000;
}

.sidebar.open {
    left: 0;
}

.sidebar a {
    display: block;
    color: white;
    text-decoration: none;
    padding: 15px 20px;
}

.sidebar a:hover {
    background: var(--accent);
}

/* Overlay */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
    z-index: 999;
}

.overlay.show {
    opacity: 1;
    visibility: visible;
}

/* Content */
.content {
    min-height: calc(100vh - 60px);
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

h1 {
    font-size: 3rem;
    margin-bottom: 10px;
}

p {
    color: #aaa;
}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <a href="/">Home</a>
    <a href="/idiot/">You Are An Idiot</a>
    <a href="/projects/">Projects</a>
    <a href="/blog/">Blog</a>
    <a href="/about/">About</a>
</nav>

<header class="header">
    <button class="menu-btn" id="menuBtn" onclick="toggleMenu()">☰</button>
</header>

<main class="content">
    <div>
        <h1>azzy.zip</h1>
        <p>How did you find the site?</p>
    </div>
</main>

<script>
function toggleMenu() {
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    const btn = document.getElementById("menuBtn");

    const isOpen = sidebar.classList.toggle("open");
    overlay.classList.toggle("show");

    btn.textContent = isOpen ? "×" : "☰";
}
</script>

</body>
</html>
