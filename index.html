<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>azzy.zip</title>

<!-- Favicons -->
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32">
<link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">

<meta name="theme-color" content="#0568D3">

<style>
:root {
    --bg: #0C0C0E;
    --accent: #0568D3;
    --text: #ffffff;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
}

/* Sidebar */
.sidebar {
    position: fixed;
    left: -250px;
    top: 0;
    width: 250px;
    height: 100%;
    background: #111114;
    border-right: 2px solid var(--accent);
    transition: left 0.3s ease;
    padding-top: 70px;
}

.sidebar.open {
    left: 0;
}

.sidebar a {
    display: block;
    color: white;
    text-decoration: none;
    padding: 15px 20px;
    transition: 0.2s;
}

.sidebar a:hover {
    background: var(--accent);
}

/* Header */
.header {
    height: 60px;
    display: flex;
    align-items: center;
    padding: 0 20px;
    border-bottom: 2px solid var(--accent);
}

.menu-btn {
    background: none;
    border: none;
    color: white;
    font-size: 28px;
    cursor: pointer;
}

/* Main Content */
.content {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 60px);
    text-align: center;
    padding: 20px;
}

h1 {
    font-size: 3rem;
    margin-bottom: 10px;
}

p {
    color: #aaa;
}
</style>
</head>
<body>

<nav class="sidebar" id="sidebar">
    <a href="/">Home</a>
    <a href="/idiot/">You Are An Idiot Revive</a>
    <a href="/projects/">Projects</a>
    <a href="/blog/">Blog</a>
    <a href="/about/">About</a>
</nav>

<header class="header">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
</header>

<main class="content">
    <div>
        <h1>azzy.zip</h1>
        <p>Welcome to my corner of the internet.</p>
    </div>
</main>

<script>
function toggleMenu() {
    document.getElementById('sidebar').classList.toggle('open');
}
</script>

</body>
</html>
