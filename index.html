<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GIF</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black; /* optional */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <img src="YouAreAnIdiot.gif" alt="gif" />
</body>
</html>
</head>
<audio id="bg" loop>
  <source src="YouAreAnIdiot_audio.wav" type="audio/wav">
</audio>

<script>
  document.addEventListener("click", () => {
    const audio = document.getElementById("bg");
    audio.play();
  }, { once: true });
</script>
